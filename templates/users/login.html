{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'css/log.css' %}" />
</head>
<body>

<div class="container d-flex justify-content-center align-items-center">
  <div class="login-container">

    <!-- Django login form -->
    <form method="POST" class="login-box" action="{% url 'login' %}" autocomplete="off">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ next }}">

      <!-- Hidden dummy fields to prevent browser autofill -->
      <input type="text" name="fakeuser" style="display:none;">
      <input type="password" name="fakepassword" style="display:none;">

      <h2>Login</h2>

      <!-- Display Django messages -->
      {% if messages %}
        <div class="mb-3">
          {% for message in messages %}
            <div class="text-danger font-semibold">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}

      <div class="input-group-custom">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Username" required autocomplete="off" autocapitalize="none" spellcheck="false" />
      </div>

      <div class="input-group-custom">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" id="password" placeholder="Password" required autocomplete="new-password" />
        <span class="icon-right">
          <i class="fas fa-eye" id="togglePassword"></i>
        </span>
      </div>

      <div class="options">
        <label><input type="checkbox" /> Remember me</label>
        <a href="{% url 'password_reset' %}">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <p class="register-link">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
    </form>

  </div>
</div>

<script>
  // Toggle password visibility
  const togglePassword = document.getElementById("togglePassword");
  const password = document.getElementById("password");

  togglePassword.addEventListener("click", function () {
    const type = password.getAttribute("type") === "password" ? "text" : "password";
    password.setAttribute("type", type);
    this.classList.toggle("fa-eye");
    this.classList.toggle("fa-eye-slash");
  });

  // Clear input fields on load to prevent browser autofill suggestions
  window.addEventListener('load', function() {
    const username = document.querySelector('input[name="username"]');
    const passwordField = document.querySelector('input[name="password"]');
    if(username) username.value = '';
    if(passwordField) passwordField.value = '';
  });

  // Prevent browser caching that triggers back button autofill
  if (window.history.replaceState) {
    window.history.replaceState(null, "", window.location.href);
  }
</script>

</body>
</html>
