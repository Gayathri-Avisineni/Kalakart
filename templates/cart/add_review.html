{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h3>Review for Order #{{ order.id }}</h3>
  <form method="POST">
    {% csrf_token %}
    <label for="rating">Rating (1–5):</label>
    <input type="number" name="rating" min="1" max="5" required class="form-control mb-3">
    
    <label for="comment">Comment:</label>
    <textarea name="comment" rows="4" class="form-control mb-3"></textarea>

    <button type="submit" class="btn btn-primary">Submit Review</button>
  </form>
</div>
{% endblock %}
